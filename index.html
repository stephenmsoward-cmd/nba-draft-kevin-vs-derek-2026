<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 NBA Playoff Draft — Kevin vs Derek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060b14;
      --surface: #0d1424;
      --surface2: #111d30;
      --border: #1a2840;
      --text: #e2e8f0;
      --muted: #64748b;
      --kevin: #3b82f6;
      --derek: #ef4444;
      --green: #22c55e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      padding: 16px;
    }

    .container { max-width: 960px; margin: 0 auto; }

    /* Header */
    .header {
      text-align: center;
      padding: 32px 0 24px;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--kevin) 30%, var(--derek) 70%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .header-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .last-updated { color: var(--muted); font-size: 0.85rem; }

    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: color 0.15s, background 0.15s;
      letter-spacing: 0.02em;
    }
    .btn:hover { background: var(--border); color: var(--text); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .view-toggle {
      display: flex;
      gap: 2px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      flex-shrink: 0;
    }

    .toggle-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 4px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s;
    }

    .toggle-btn.active {
      background: var(--border);
      color: var(--text);
    }

    .toggle-btn:hover:not(.active) { color: var(--text); }

    /* Scoreboard */
    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .score-player { text-align: center; }

    .score-player .player-name {
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .score-player.kevin .player-name { color: var(--kevin); }
    .score-player.derek .player-name { color: var(--derek); }

    .score-player .player-count {
      font-size: 3.5rem;
      font-weight: 900;
      line-height: 1;
    }

    .score-player.kevin .player-count { color: var(--kevin); }
    .score-player.derek .player-count { color: var(--derek); }

    .score-player .player-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .score-player .player-ff {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 2px;
      opacity: 0.7;
    }

    .score-vs {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* Section header */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .section-line { flex: 1; height: 1px; background: var(--border); }

    /* Series cards */
    .matchups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    .series-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .series-card.series-over { opacity: 0.45; }

    .round-label {
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .series-body {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .series-team-block {
      flex: 1;
      text-align: center;
      min-width: 0;
    }

    .series-team-abbr {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .series-team-abbr.elim {
      text-decoration: line-through;
      opacity: 0.35;
    }

    .series-team-owner {
      font-size: 0.68rem;
      font-weight: 700;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .owner-kevin { color: var(--kevin); }
    .owner-derek { color: var(--derek); }
    .owner-none  { color: var(--muted); }

    .series-score-block { text-align: center; flex-shrink: 0; }

    .series-score {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.02em;
      min-width: 54px;
    }

    .series-summary-text {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    /* Teams columns */
    .teams-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 40px;
    }

    .teams-column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .teams-column-header {
      padding: 13px 16px;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }

    .teams-column.kevin .teams-column-header { color: var(--kevin); }
    .teams-column.derek .teams-column-header { color: var(--derek); }

    .team-row {
      display: flex;
      align-items: center;
      padding: 9px 16px;
      border-bottom: 1px solid var(--bg);
      gap: 10px;
    }

    .team-row:last-child { border-bottom: none; }
    .team-row.eliminated { opacity: 0.28; }
    .team-row.no-playoffs { opacity: 0.2; }
    .team-row.eliminated .team-abbr { text-decoration: line-through; }

    .team-row .team-abbr { font-size: 0.88rem; font-weight: 800; width: 36px; flex-shrink: 0; }
    .team-row .team-name { font-size: 0.8rem; color: var(--muted); flex: 1; }
    .team-row .team-status { font-size: 0.75rem; font-weight: 700; }

    .s-alive { color: var(--green); }
    .s-elim  { color: var(--derek); }
    .s-none  { color: var(--muted); }

    /* Misc */
    .loading-msg {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 0.88rem;
      grid-column: 1 / -1;
    }

    .error-banner {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fca5a5;
      font-size: 0.8rem;
      margin-bottom: 20px;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.68rem;
      padding: 20px 0 40px;
      opacity: 0.4;
    }

    /* ── Bracket ── */
    .bracket-outer { overflow-x: auto; margin-bottom: 40px; }

    .bracket-wrap {
      display: flex;
      align-items: stretch;
      height: 380px;
      min-width: 700px;
      gap: 0;
    }

    .conf-bracket { flex: 1; display: flex; gap: 0; }

    .b-round {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      overflow: visible;
      position: relative;
    }

    .b-matchup {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Slot */
    .b-slot {
      height: 28px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.75rem;
      position: relative;
      z-index: 1;
      white-space: nowrap;
    }

    .b-slot.b-winner { border-color: rgba(34,197,94,0.55); background: rgba(34,197,94,0.07); }
    .b-slot.b-elim   { opacity: 0.22; }
    .b-slot.b-tbd    { border-style: dashed; color: var(--muted); justify-content: center; font-size: 0.68rem; }

    .b-seed  { font-size: 0.58rem; color: var(--muted); font-weight: 700; min-width: 10px; }
    .b-abbr  { font-weight: 800; font-size: 0.8rem; }
    .b-otag  { font-size: 0.6rem; font-weight: 700; margin-left: auto; }

    /* Gap between slots (shows series leader + score) */
    .b-gap {
      height: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      gap: 1px;
    }

    .b-gap-leader {
      font-size: 0.56rem;
      font-weight: 700;
      background: var(--bg);
      padding: 0 3px;
      z-index: 2;
      position: relative;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .b-gap-score {
      font-size: 0.62rem;
      font-weight: 800;
      background: var(--bg);
      padding: 0 3px;
      z-index: 2;
      position: relative;
    }

    /* Connector lines — East: right side (slot=28px, gap=24px → total=80px)
       top slot center: 14px, bottom slot center: 66px, midpoint: 40px */
    .east-round .b-matchup::before {
      content: ''; position: absolute;
      right: 0; top: 14px; height: 52px; width: 1px;
      background: var(--border);
    }
    .east-round .b-matchup::after {
      content: ''; position: absolute;
      right: -7px; top: 40px; height: 1px; width: 7px;
      background: var(--border);
    }

    /* Connector lines — West: left side */
    .west-round .b-matchup::before {
      content: ''; position: absolute;
      left: 0; top: 14px; height: 52px; width: 1px;
      background: var(--border);
    }
    .west-round .b-matchup::after {
      content: ''; position: absolute;
      left: -7px; top: 40px; height: 1px; width: 7px;
      background: var(--border);
    }

    /* Finals column */
    .finals-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 130px;
      padding: 0 8px;
      gap: 8px;
    }

    .finals-title {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
    }

    /* Conference name labels */
    .bracket-conf-labels {
      display: flex;
      min-width: 700px;
      margin-bottom: 6px;
    }
    .bcl-conf { flex: 1; display: flex; }
    .bcl-cell {
      flex: 1;
      text-align: center;
      font-size: 0.58rem;
      font-weight: 700;
      color: #334155;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .bcl-finals { min-width: 130px; }

    /* Today's Games */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }

    .game-card.live {
      border-color: #22c55e44;
      box-shadow: 0 0 0 1px #22c55e22;
    }

    .game-status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .game-status-text {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .game-status-text.final  { color: var(--muted); }
    .game-status-text.sched  { color: var(--muted); }

    .game-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }

    .game-team-abbr {
      font-size: 1rem;
      font-weight: 800;
      width: 38px;
    }

    .game-team-owner {
      font-size: 0.68rem;
      font-weight: 700;
      flex: 1;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .game-score {
      font-size: 1.1rem;
      font-weight: 900;
      min-width: 30px;
      text-align: right;
    }

    .game-score.winning { color: var(--text); }
    .game-score.losing  { color: var(--muted); }
    .game-score.tied    { color: var(--text); }

    .no-games-msg {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 20px 0;
      grid-column: 1 / -1;
    }

    @media (max-width: 560px) {
      .scoreboard {
        grid-template-columns: 1fr 1fr;
      }
      .score-vs { display: none; }
      .teams-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>2026 NBA Playoff Draft</h1>
    <div class="header-meta">
      <span class="last-updated" id="last-updated">Loading...</span>
      <button class="btn" id="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </div>

  <div id="error-container"></div>

  <div class="scoreboard">
    <div class="score-player kevin">
      <div class="player-name">Kevin</div>
      <div class="player-count" id="kevin-count">—</div>
      <div class="player-label">teams alive</div>
      <div class="player-ff" id="kevin-ff"></div>
    </div>
    <div class="score-vs">VS</div>
    <div class="score-player derek">
      <div class="player-name">Derek</div>
      <div class="player-count" id="derek-count">—</div>
      <div class="player-label">teams alive</div>
      <div class="player-ff" id="derek-ff"></div>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title">Today's Games</span>
    <div class="section-line"></div>
  </div>
  <div class="games-grid" id="games-container">
    <div class="no-games-msg">Loading…</div>
  </div>

  <div class="section-header">
    <span class="section-title">Playoff Series</span>
    <div class="section-line"></div>
    <div class="view-toggle">
      <button class="toggle-btn active" id="tab-bracket" onclick="switchTab('bracket')">Bracket</button>
      <button class="toggle-btn" id="tab-series" onclick="switchTab('series')">Series</button>
    </div>
  </div>

  <div id="view-bracket">
    <div class="bracket-outer">
      <div class="bracket-conf-labels">
        <div class="bcl-conf">
          <div class="bcl-cell">1st Rd</div>
          <div class="bcl-cell">Semis</div>
          <div class="bcl-cell">East Finals</div>
        </div>
        <div class="bcl-finals"></div>
        <div class="bcl-conf">
          <div class="bcl-cell">West Finals</div>
          <div class="bcl-cell">Semis</div>
          <div class="bcl-cell">1st Rd</div>
        </div>
      </div>
      <div id="bracket-container">
        <div class="loading-msg" style="min-width:700px">Loading bracket…</div>
      </div>
    </div>
  </div>

  <div id="view-series" style="display:none">
    <div class="matchups-grid" id="matchups-container">
      <div class="loading-msg">Fetching playoff data…</div>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title">Draft Picks</span>
    <div class="section-line"></div>
  </div>
  <div class="teams-grid" id="teams-container"></div>

  <div class="footer">Data via ESPN · Updates on page load</div>

</div>

<script>
// ── Draft config ──────────────────────────────────────────────────────
const DRAFT = {
  Kevin: ['SAS','DEN','NYK','CLE','ATL','LAL','CHA','PHI','POR','GSW'],
  Derek: ['OKC','DET','BOS','HOU','MIN','TOR','ORL','PHX','LAC','MIA'],
};

const TEAM_NAMES = {
  OKC:'Thunder',  DET:'Pistons',     BOS:'Celtics',   HOU:'Rockets',
  MIN:'Timberwolves', TOR:'Raptors', ORL:'Magic',     PHX:'Suns',
  LAC:'Clippers', MIA:'Heat',        SAS:'Spurs',     DEN:'Nuggets',
  NYK:'Knicks',   CLE:'Cavaliers',   ATL:'Hawks',     LAL:'Lakers',
  CHA:'Hornets',  PHI:'76ers',       POR:'Trail Blazers', GSW:'Warriors',
};

// ESPN sometimes uses shorter abbreviations
const ABBR_FIX = { PHO:'PHX', GS:'GSW', SA:'SAS', NY:'NYK', NO:'NOP' };
const norm = a => { if (!a) return ''; const u = a.toUpperCase(); return ABBR_FIX[u] || u; };
const getOwner = abbr => { for (const [n,t] of Object.entries(DRAFT)) if (t.includes(abbr)) return n; return null; };
const ownerCls = o => o === 'Kevin' ? 'owner-kevin' : o === 'Derek' ? 'owner-derek' : 'owner-none';

// ── ESPN fetching ─────────────────────────────────────────────────────
function playoffDates() {
  const start = new Date('2026-04-18');
  const today = new Date();
  const dates = [];
  for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1))
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
  return dates;
}

async function fetchDate(date) {
  try {
    const r = await fetch(
      `https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates=${date}&seasontype=3`
    );
    const j = await r.json();
    return (j.events || []).map(e => ({ ...e, _date: date }));
  } catch { return []; }
}

async function fetchAll() {
  const all = await Promise.all(playoffDates().map(fetchDate));
  return all.flat();
}

// ── Series processing ─────────────────────────────────────────────────
function processEvents(events) {
  // Chronological order — later events overwrite earlier ones for same series
  events.sort((a, b) => a._date.localeCompare(b._date));

  const map = new Map();

  for (const ev of events) {
    const comp = ev.competitions?.[0];
    if (!comp) continue;

    const cs = comp.competitors || [];
    if (cs.length < 2) continue;

    const away = cs.find(c => c.homeAway === 'away') || cs[0];
    const home = cs.find(c => c.homeAway === 'home') || cs[1];

    const awayAbbr = norm(away.team?.abbreviation);
    const homeAbbr = norm(home.team?.abbreviation);
    const key = [awayAbbr, homeAbbr].sort().join('_');

    // Series wins — ESPN series.competitors use team ID, not abbreviation
    let awayWins = 0, homeWins = 0;
    const serObj = comp.series;
    const idToAbbr = {};
    for (const c of cs) { if (c.team?.id) idToAbbr[c.team.id] = norm(c.team.abbreviation); }
    if (serObj?.competitors?.length) {
      for (const sc of serObj.competitors) {
        const a = idToAbbr[sc.id] || norm(sc.team?.abbreviation);
        if (a === awayAbbr) awayWins = sc.wins || 0;
        else if (a === homeAbbr) homeWins = sc.wins || 0;
      }
    }

    // Round label from event notes
    const note = comp.notes?.[0]?.headline || '';
    let round = 'Playoffs';
    if      (/first round/i.test(note))      round = '1st Round';
    else if (/second round|conf.*semi/i.test(note)) round = 'Conf. Semis';
    else if (/conf.*final/i.test(note))      round = 'Conf. Finals';
    else if (/nba final/i.test(note))        round = 'NBA Finals';

    const completed = Math.max(awayWins, homeWins) >= 4;

    map.set(key, {
      key, awayAbbr, homeAbbr,
      awayName: away.team?.displayName || awayAbbr,
      homeName: home.team?.displayName || homeAbbr,
      awayWins, homeWins,
      summary: serObj?.summary || '',
      completed, round,
    });
  }

  return map;
}

function eliminated(seriesMap) {
  const out = new Set();
  for (const s of seriesMap.values()) {
    if (!s.completed) continue;
    if (s.awayWins >= 4) out.add(s.homeAbbr);
    else if (s.homeWins >= 4) out.add(s.awayAbbr);
  }
  return out;
}

function playoffTeams(seriesMap) {
  const out = new Set();
  for (const s of seriesMap.values()) { out.add(s.awayAbbr); out.add(s.homeAbbr); }
  return out;
}

// ── Render ────────────────────────────────────────────────────────────
function calcMaxFinalFour(playerName, sm) {
  const owned = new Set(DRAFT[playerName]);
  let count = 0;
  for (const conf of ['East','West']) {
    const r1 = CONF_BRACKET[conf];
    // R1: use real winner if known, else player's team wins
    const r1p = r1.map(({t,b}) => {
      const w = bracketWinner(t, b, sm);
      if (w) return w;
      if (owned.has(t)) return t;
      if (owned.has(b)) return b;
      return t; // neither owned — top seed advances
    });
    // R2
    const r2p = R2_PAIRS.map(([i,j]) => {
      const a = r1p[i], b = r1p[j];
      const w = bracketWinner(a, b, sm);
      if (w) return w;
      if (owned.has(a)) return a;
      if (owned.has(b)) return b;
      return a;
    });
    // Both r2p teams reach Conference Finals = Final 4
    for (const t of r2p) if (owned.has(t)) count++;
  }
  return count;
}

function renderScoreboard(elim, inPlayoffs, sm) {
  for (const name of ['Kevin','Derek']) {
    const alive = DRAFT[name].filter(t => inPlayoffs.has(t) && !elim.has(t)).length;
    const ff    = sm ? calcMaxFinalFour(name, sm) : '—';
    document.getElementById(`${name.toLowerCase()}-count`).textContent = alive;
    document.getElementById(`${name.toLowerCase()}-ff`).textContent = `(${ff} max Final 4)`;
  }
}

const ROUND_ORDER = { '1st Round':1, 'Conf. Semis':2, 'Conf. Finals':3, 'NBA Finals':4, 'Playoffs':5 };

function ownerSummary(s) {
  const ao = getOwner(s.awayAbbr), ho = getOwner(s.homeAbbr);
  const { awayWins: aw, homeWins: hw } = s;
  if (s.completed) {
    if (aw >= 4) return `${ao} wins series ${aw}–${hw}`;
    if (hw >= 4) return `${ho} wins series ${hw}–${aw}`;
  }
  if (aw > hw) return `${ao} leads ${aw}–${hw}`;
  if (hw > aw) return `${ho} leads ${hw}–${aw}`;
  if (aw > 0)  return `Series tied ${aw}–${hw}`;
  return '';
}

function renderMatchups(seriesMap, elim) {
  const el = document.getElementById('matchups-container');
  if (!seriesMap.size) {
    el.innerHTML = '<div class="loading-msg">No playoff series found yet — check back once the playoffs begin.</div>';
    return;
  }

  const sorted = [...seriesMap.values()].sort((a,b) => {
    if (a.completed !== b.completed) return a.completed ? 1 : -1;
    return (ROUND_ORDER[a.round]||5) - (ROUND_ORDER[b.round]||5);
  });

  el.innerHTML = sorted.map(s => {
    const aoOwner = getOwner(s.awayAbbr);
    const hoOwner = getOwner(s.homeAbbr);
    const hasScore = s.awayWins > 0 || s.homeWins > 0;
    return `
      <div class="series-card ${s.completed ? 'series-over' : ''}">
        <div class="round-label">${s.round}</div>
        <div class="series-body">
          <div class="series-team-block">
            <div class="series-team-abbr ${elim.has(s.awayAbbr) ? 'elim' : ''}">${s.awayAbbr}</div>
            <div class="series-team-owner ${ownerCls(aoOwner)}">${aoOwner || '—'}</div>
          </div>
          <div class="series-score-block">
            <div class="series-score">${hasScore ? `${s.awayWins}–${s.homeWins}` : '–'}</div>
          </div>
          <div class="series-team-block">
            <div class="series-team-abbr ${elim.has(s.homeAbbr) ? 'elim' : ''}">${s.homeAbbr}</div>
            <div class="series-team-owner ${ownerCls(hoOwner)}">${hoOwner || '—'}</div>
          </div>
        </div>
        ${(ownerSummary(s) || s.summary) ? `<div class="series-summary-text">${ownerSummary(s) || s.summary}</div>` : ''}
      </div>`;
  }).join('');
}

function renderTeams(elim, inPlayoffs) {
  const el = document.getElementById('teams-container');
  const knownPlayoffs = inPlayoffs.size > 0;

  const col = (name) => {
    const cls = name.toLowerCase();
    const rows = DRAFT[name].map(abbr => {
      const inP = inPlayoffs.has(abbr);
      const isElim = elim.has(abbr);
      const rowCls = isElim ? 'eliminated' : (!inP && knownPlayoffs ? 'no-playoffs' : '');
      const sCls   = isElim ? 's-elim' : (!inP && knownPlayoffs ? 's-none' : 's-alive');
      const icon   = isElim ? '✗' : (!inP && knownPlayoffs ? '—' : '✓');
      return `
        <div class="team-row ${rowCls}">
          <span class="team-abbr">${abbr}</span>
          <span class="team-name">${TEAM_NAMES[abbr] || ''}</span>
          <span class="team-status ${sCls}">${icon}</span>
        </div>`;
    }).join('');
    return `
      <div class="teams-column ${cls}">
        <div class="teams-column-header">${name}'s Picks</div>
        ${rows}
      </div>`;
  };

  el.innerHTML = col('Kevin') + col('Derek');
}

// ── Tab toggle ────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('view-bracket').style.display = tab === 'bracket' ? '' : 'none';
  document.getElementById('view-series').style.display  = tab === 'series'  ? '' : 'none';
  document.getElementById('tab-bracket').classList.toggle('active', tab === 'bracket');
  document.getElementById('tab-series').classList.toggle('active',  tab === 'series');
}

// ── Bracket ───────────────────────────────────────────────────────────
const CONF_BRACKET = {
  East: [
    {t:'DET',ts:1, b:'ORL',bs:8},
    {t:'BOS',ts:2, b:'PHI',bs:7},
    {t:'NYK',ts:3, b:'ATL',bs:6},
    {t:'CLE',ts:4, b:'TOR',bs:5},
  ],
  West: [
    {t:'OKC',ts:1, b:'PHX',bs:8},
    {t:'SAS',ts:2, b:'POR',bs:7},
    {t:'DEN',ts:3, b:'MIN',bs:6},
    {t:'LAL',ts:4, b:'HOU',bs:5},
  ],
};
// NBA fixed bracket: 1/8 winner vs 4/5 winner; 2/7 winner vs 3/6 winner
const R2_PAIRS = [[0,3],[1,2]];

function bracketWinner(a, b, sm) {
  if (!a || !b) return null;
  const s = sm.get([a,b].sort().join('_'));
  if (!s) return null;
  if (s.awayWins >= 4) return s.awayAbbr;
  if (s.homeWins >= 4) return s.homeAbbr;
  return null;
}

function bracketScore(a, b, sm) {
  if (!a || !b) return '';
  const s = sm.get([a,b].sort().join('_'));
  if (!s || (s.awayWins === 0 && s.homeWins === 0)) return '';
  const aW = s.awayAbbr === a ? s.awayWins : s.homeWins;
  const bW = s.awayAbbr === b ? s.awayWins : s.homeWins;
  return `${aW}–${bW}`;
}

// Returns { score, leader: 'Kevin'|'Derek'|'tied'|null, summary }
function bracketStatus(a, b, sm) {
  if (!a || !b) return { score: '', leader: null, summary: '' };
  const s = sm.get([a,b].sort().join('_'));
  if (!s) return { score: '', leader: null, summary: '' };
  if (s.awayWins === 0 && s.homeWins === 0) return { score: '', leader: null, summary: s.summary || '' };
  const aW = s.awayAbbr === a ? s.awayWins : s.homeWins;
  const bW = s.awayAbbr === b ? s.awayWins : s.homeWins;
  const score = `${aW}–${bW}`;
  if (aW === bW) return { score, leader: 'tied', summary: '' };
  return { score, leader: aW > bW ? getOwner(a) : getOwner(b), summary: '' };
}

function buildRounds(conf, sm) {
  const r1 = CONF_BRACKET[conf];
  const w1 = r1.map(m => bracketWinner(m.t, m.b, sm));
  const r2 = R2_PAIRS.map(([i,j]) => ({t:w1[i], ts:null, b:w1[j], bs:null}));
  const w2 = r2.map(m => bracketWinner(m.t, m.b, sm));
  const r3 = [{t:w2[0], ts:null, b:w2[1], bs:null}];
  const w3 = r3.map(m => bracketWinner(m.t, m.b, sm));
  return {
    r1: r1.map((m,i) => ({...m, winner:w1[i], ...bracketStatus(m.t,m.b,sm)})),
    r2: r2.map((m,i) => ({...m, winner:w2[i], ...bracketStatus(m.t,m.b,sm)})),
    r3: r3.map((m,i) => ({...m, winner:w3[i], ...bracketStatus(m.t,m.b,sm)})),
    confWinner: w3[0],
  };
}

function bSlot(abbr, seed, isWin, isElim) {
  if (abbr === null || abbr === undefined)
    return `<div class="b-slot b-tbd">TBD</div>`;
  const o = getOwner(abbr);
  const cls = isWin ? 'b-winner' : isElim ? 'b-elim' : '';
  return `<div class="b-slot ${cls}">
    ${seed ? `<span class="b-seed">${seed}</span>` : ''}
    <span class="b-abbr">${abbr}</span>
    <span class="b-otag ${ownerCls(o)}">${o||''}</span>
  </div>`;
}

function bMatchup(m) {
  const tW = m.winner === m.t, bW = m.winner === m.b;
  let gapHtml = '';
  if (m.score) {
    if (m.leader === 'tied') {
      gapHtml = `<span class="b-gap-leader" style="color:var(--muted)">Tied</span>
                 <span class="b-gap-score" style="color:var(--muted)">${m.score}</span>`;
    } else if (m.leader) {
      const col = m.leader === 'Kevin' ? 'var(--kevin)' : 'var(--derek)';
      gapHtml = `<span class="b-gap-leader" style="color:${col}">${m.leader} leads</span>
                 <span class="b-gap-score" style="color:${col}">${m.score}</span>`;
    }
  } else if (m.summary) {
    gapHtml = `<span class="b-gap-leader" style="color:var(--muted)">${m.summary}</span>`;
  }
  return `<div class="b-matchup">
    ${bSlot(m.t, m.ts, tW, m.winner && !tW)}
    <div class="b-gap">${gapHtml}</div>
    ${bSlot(m.b, m.bs, bW, m.winner && !bW)}
  </div>`;
}

function renderBracket(sm) {
  const E = buildRounds('East', sm);
  const W = buildRounds('West', sm);
  const finals = {
    t: E.confWinner, ts: null,
    b: W.confWinner, bs: null,
    winner: bracketWinner(E.confWinner, W.confWinner, sm),
    ...bracketStatus(E.confWinner, W.confWinner, sm),
  };

  document.getElementById('bracket-container').innerHTML = `
    <div class="bracket-wrap">
      <div class="conf-bracket">
        <div class="b-round east-round">${E.r1.map(bMatchup).join('')}</div>
        <div class="b-round east-round">${E.r2.map(bMatchup).join('')}</div>
        <div class="b-round">${E.r3.map(bMatchup).join('')}</div>
      </div>
      <div class="finals-col">
        <div class="finals-title">🏆 NBA Finals</div>
        ${bMatchup(finals)}
      </div>
      <div class="conf-bracket">
        <div class="b-round">${W.r3.map(bMatchup).join('')}</div>
        <div class="b-round west-round">${W.r2.map(bMatchup).join('')}</div>
        <div class="b-round west-round">${W.r1.map(bMatchup).join('')}</div>
      </div>
    </div>`;
}

// ── Live games ────────────────────────────────────────────────────────
let liveRefreshTimer = null;

async function fetchLiveGames() {
  try {
    const r = await fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?seasontype=3');
    const j = await r.json();
    return j.events || [];
  } catch { return []; }
}

function renderLiveGames(events) {
  const el = document.getElementById('games-container');

  if (!events.length) {
    el.innerHTML = '<div class="no-games-msg">No games today.</div>';
    return;
  }

  let anyLive = false;

  el.innerHTML = events.map(ev => {
    const comp = ev.competitions?.[0];
    if (!comp) return '';

    const status   = comp.status?.type;
    const isLive   = status?.state === 'in';
    const isFinal  = status?.state === 'post';
    const detail   = status?.shortDetail || status?.detail || '';
    if (isLive) anyLive = true;

    const cs   = comp.competitors || [];
    const away = cs.find(c => c.homeAway === 'away') || cs[0];
    const home = cs.find(c => c.homeAway === 'home') || cs[1];

    const awayAbbr  = norm(away?.team?.abbreviation);
    const homeAbbr  = norm(home?.team?.abbreviation);
    const awayScore = parseInt(away?.score) || 0;
    const homeScore = parseInt(home?.score) || 0;
    const awayOwner = getOwner(awayAbbr);
    const homeOwner = getOwner(homeAbbr);

    const awayWin = awayScore > homeScore;
    const homeWin = homeScore > awayScore;

    const statusCls  = isLive ? '' : isFinal ? 'final' : 'sched';
    const statusLabel = isLive ? detail : isFinal ? `Final${detail ? ' · ' + detail : ''}` : detail;
    const showScore  = isLive || isFinal;

    return `
      <div class="game-card ${isLive ? 'live' : ''}">
        <div class="game-status-bar">
          ${isLive ? '<div class="live-dot"></div>' : ''}
          <span class="game-status-text ${statusCls}">${statusLabel}</span>
        </div>
        <div class="game-row">
          <span class="game-team-abbr">${awayAbbr}</span>
          <span class="game-team-owner ${ownerCls(awayOwner)}">${awayOwner || '—'}</span>
          ${showScore ? `<span class="game-score ${awayWin ? 'winning' : homeWin ? 'losing' : 'tied'}">${awayScore}</span>` : ''}
        </div>
        <div class="game-row">
          <span class="game-team-abbr">${homeAbbr}</span>
          <span class="game-team-owner ${ownerCls(homeOwner)}">${homeOwner || '—'}</span>
          ${showScore ? `<span class="game-score ${homeWin ? 'winning' : awayWin ? 'losing' : 'tied'}">${homeScore}</span>` : ''}
        </div>
      </div>`;
  }).join('');

  // Auto-refresh every 30s while games are live
  clearTimeout(liveRefreshTimer);
  if (anyLive) {
    liveRefreshTimer = setTimeout(async () => {
      const fresh = await fetchLiveGames();
      renderLiveGames(fresh);
    }, 30000);
  }
}

// ── Main ──────────────────────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '↻ Loading…';
  document.getElementById('error-container').innerHTML = '';

  try {
    const [events, liveEvents] = await Promise.all([fetchAll(), fetchLiveGames()]);
    const sm       = processEvents(events);
    const elim     = eliminated(sm);
    const inP      = playoffTeams(sm);

    renderScoreboard(elim, inP, sm);
    renderBracket(sm);
    renderLiveGames(liveEvents);
    renderMatchups(sm, elim);
    renderTeams(elim, inP);

    const now = new Date();
    document.getElementById('last-updated').textContent =
      `Updated ${now.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })}`;

    localStorage.setItem('nba26-cache', JSON.stringify({
      series:      [...sm.entries()],
      elim:        [...elim],
      inPlayoffs:  [...inP],
      ts:          Date.now(),
    }));

  } catch (err) {
    document.getElementById('error-container').innerHTML =
      `<div class="error-banner">⚠ Could not load data: ${err.message}</div>`;
    document.getElementById('last-updated').textContent = 'Error — showing cached data';

    try {
      const c = JSON.parse(localStorage.getItem('nba26-cache') || 'null');
      if (c) {
        const sm   = new Map(c.series);
        const elim = new Set(c.elim);
        const inP  = new Set(c.inPlayoffs);
        renderScoreboard(elim, inP, sm);
        renderMatchups(sm, elim);
        renderTeams(elim, inP);
        const ago = Math.round((Date.now() - c.ts) / 60000);
        document.getElementById('last-updated').textContent = `Cached data (${ago}m ago)`;
      }
    } catch {}
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ Refresh';
  }
}

loadData();
</script>
